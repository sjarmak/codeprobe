name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[all,dev]"
      # INV2 tenant guard: derive_tenant() fail-louds when CI=true and no tenant
      # is set. Set it explicitly so the guard fires only for user error, not
      # for our own test suite. Tests that exercise the guard itself override
      # via monkeypatch and are unaffected.
      - run: pytest --cov=src/codeprobe --cov-report=term-missing --cov-fail-under=80
        env:
          CODEPROBE_TENANT: ci-${{ github.sha }}

  publish:
    needs: [test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.CODEPROBE }}
