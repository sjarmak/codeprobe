# ZFC boundary lint allowlist.
#
# One [[entry]] table per pre-existing violation. The linter suppresses
# findings whose (file, line) fall inside an allowlisted region.
#
# Source: CLAUDE.md -> "ZFC Compliance" -> "Known violations". When a
# violation is refactored to delegate to a model, delete its entry here
# AND update CLAUDE.md in the same commit.
#
# Fields:
#   file       — repo-relative path (POSIX separators).
#   line_start — first line of the allowlisted region (inclusive).
#   line_end   — last line of the allowlisted region (inclusive).
#                Use the same value as line_start for a single line.
#   reason     — one-line human explanation; points back to CLAUDE.md.

[[entry]]
file = "src/codeprobe/mining/extractor.py"
line_start = 80
line_end = 87
reason = "Known violation: file-count difficulty estimation (<=3 easy, >10 hard). CLAUDE.md ZFC section."

